name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment name
        id: set_env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "TF_ENV=prod" >> $GITHUB_ENV
            echo "IMG_TAG=main" >> $GITHUB_ENV
          else
            echo "TF_ENV=dev" >> $GITHUB_ENV
            echo "IMG_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init and Outputs
        id: tf
        working-directory: infra/terraform/environments/${{ env.TF_ENV }}
        run: |
          terraform init -input=false
          echo "ECR_URL=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
          echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_ENV
          echo "SERVICE_NAME=$(terraform output -raw ecs_service_name)" >> $GITHUB_ENV
          echo "EXECUTION_ROLE_ARN=$(terraform output -raw ecs_task_execution_role_arn)" >> $GITHUB_ENV

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t backend:$IMAGE_SHA_TAG -f docker/backend/Dockerfile .

      - name: Tag and Push image to ECR
        run: |
          docker tag backend:$IMAGE_SHA_TAG ${{ env.ECR_URL }}:$IMAGE_SHA_TAG
          docker tag backend:$IMAGE_SHA_TAG ${{ env.ECR_URL }}:${{ env.IMG_TAG }}
          docker push ${{ env.ECR_URL }}:$IMAGE_SHA_TAG
          docker push ${{ env.ECR_URL }}:${{ env.IMG_TAG }}

      - name: Render task definition
        run: |
          sed -e "s|IMAGE_URI|${{ env.ECR_URL }}:$IMAGE_SHA_TAG|g" \
              -e "s|EXECUTION_ROLE_ARN|${{ env.EXECUTION_ROLE_ARN }}|g" \
              .github/workflows/ecs-task-def.json > task-def.json

      - name: Deploy to ECS
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.CLUSTER_NAME }} \
            --service ${{ env.SERVICE_NAME }} \
            --task-definition $TASK_DEF_ARN \
            --force-new-deployment

      - name: Resumo Deploy
        run: |
          echo "Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.TF_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`$IMAGE_SHA_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ALB URL**: [http://${{ env.ALB_DNS }}](http://${{ env.ALB_DNS }})" >> $GITHUB_STEP_SUMMARY
